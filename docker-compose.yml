services:
  postgres:
    image: postgres:16-alpine
    container_name: usagemeter-postgres
    environment:
      POSTGRES_USER: usagemeter
      POSTGRES_PASSWORD: usagemeter
      POSTGRES_DB: usagemeter
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usagemeter -d usagemeter"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: usagemeter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
